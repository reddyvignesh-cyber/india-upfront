name: Nightly Data Update

on:
  schedule:
    # Run at 9 PM UTC (2:30 AM IST next day)
    - cron: '0 21 * * *'
  workflow_dispatch: {} # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run data update scripts
        run: npx tsx scripts/update-data.ts
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}

      - name: Check for changes
        id: check_changes
        run: |
          git add src/data/auto/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "IndiaUpfront Bot"
          git config user.email "bot@indiaupfront.com"
          git commit -m "Nightly data update $(date -u +%Y-%m-%d)"
          git push
